<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#111827;color:#d1d5db;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.container{width:100%;max-width:28rem;display:flex;flex-direction:column;gap:2rem}
.header{text-align:center}
.header svg{width:48px;height:48px;stroke-width:1.5;transition:color .5s}
.header h1{font-size:1.5rem;font-weight:700;color:#e5e7eb;margin-top:.75rem}
.header p{font-size:.75rem;color:#6b7280;margin-top:.5rem}
.header .hl{color:#22c55e}
.card{border-radius:.75rem;border:1px solid #1f2937;background:#141b2a;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;box-shadow:0 10px 15px -3px rgba(0,0,0,.2)}
label{font-size:.65rem;letter-spacing:.15em;color:#6b7280;text-transform:uppercase}
input[type=text],input[type=password]{width:100%;border-radius:.5rem;border:1px solid #1f2937;background:#1a2332;padding:.75rem 1rem;font-size:.875rem;color:#e5e7eb;font-family:inherit;outline:none;transition:box-shadow .2s}
input:focus{box-shadow:0 0 0 2px rgba(34,197,94,.3)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:3rem}
.toggle-vis{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;padding:0}
.toggle-vis:hover{color:#e5e7eb}
.meter{display:flex;gap:4px;height:6px}
.meter-seg{flex:1;border-radius:999px;background:#1f2937;transition:background .3s}
.meter-label{display:flex;justify-content:space-between;font-size:.65rem;letter-spacing:.1em}
.feedback{border-radius:.5rem;background:rgba(31,41,55,.5);padding:1rem;display:flex;flex-direction:column;gap:.375rem}
.feedback p{font-size:.7rem}
.fb-good{color:#22c55e}
.fb-warn{color:#ef4444}
.fb-info{color:#6b7280}
.strength-area{display:flex;flex-direction:column;gap:1rem;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.gen-output{display:flex;align-items:center;border-radius:.5rem;border:1px solid #1f2937;background:#1a2332;padding:.75rem 1rem}
.gen-output span{flex:1;font-size:.875rem;word-break:break-all}
.gen-output .placeholder{color:#6b7280}
.gen-output button{margin-left:.5rem;flex-shrink:0;background:none;border:none;color:#6b7280;cursor:pointer}
.gen-output button:hover{color:#e5e7eb}
.gen-output button:disabled{opacity:.3;cursor:default}
.slider-row{display:flex;justify-content:space-between;align-items:center}
.slider-row span{font-size:.7rem;color:#22c55e}
input[type=range]{width:100%;accent-color:#22c55e;height:6px;border-radius:999px;appearance:auto;background:#1f2937;cursor:pointer}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.char-btn{border-radius:.5rem;border:1px solid;padding:.5rem .75rem;font-size:.7rem;font-family:inherit;cursor:pointer;transition:all .2s;background:none}
.char-btn.active{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#22c55e}
.char-btn.inactive{border-color:#1f2937;background:rgba(31,41,55,.3);color:#6b7280}
.gen-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.5rem;background:#22c55e;padding:.75rem 1rem;font-size:.875rem;font-weight:700;color:#111827;border:none;font-family:inherit;cursor:pointer;transition:background .2s}
.gen-btn:hover{background:#16a34a}
.footer{text-align:center;font-size:.65rem;color:rgba(107,114,128,.6)}
h2{font-size:.75rem;font-weight:700;letter-spacing:.15em;color:#6b7280}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div id="shieldIcon"></div>
    <h1>Password Strength Checker</h1>
    <p>Checked against <span class="hl">1,000+</span> known compromised passwords</p>
  </div>
  <div class="card">
    <div><label>USERNAME</label><input type="text" id="username" placeholder="Enter username..."></div>
    <div><label>PASSWORD</label><div class="pw-wrap"><input type="password" id="password" placeholder="Enter password to check..."><button class="toggle-vis" id="toggleVis" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <div id="strengthArea" class="strength-area hidden">
      <div><div class="meter" id="meter"></div><div class="meter-label"><span id="meterLabel"></span><span id="meterScore"></span></div></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
  <div class="card">
    <h2>PASSWORD GENERATOR</h2>
    <div class="gen-output"><span id="genOut" class="placeholder">Click generate...</span><button id="copyBtn" type="button" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
    <div><div class="slider-row"><label>LENGTH</label><span id="lenVal">16</span></div><input type="range" id="lenSlider" min="6" max="64" value="16"></div>
    <div class="char-grid" id="charGrid"></div>
    <button class="gen-btn" id="genBtn" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Generate Password</button>
  </div>
  <p class="footer">Passwords are checked locally — nothing is sent to any server.</p>
</div>
<script>
const COMMON_PASSWORDS=new Set(["123456","password","12345678","qwerty","123456789","12345","1234","111111","1234567","dragon","123123","baseball","abc123","football","monkey","letmein","shadow","master","666666","qwertyuiop","123321","mustang","1234567890","michael","654321","superman","1qaz2wsx","7777777","fuckyou","121212","000000","qazwsx","123qwe","killer","trustno1","jordan","jennifer","zxcvbnm","asdfgh","hunter","buster","soccer","harley","batman","andrew","tigger","sunshine","iloveyou","2000","charlie","robert","thomas","hockey","ranger","daniel","starwars","klaster","112233","george","computer","michelle","jessica","pepper","1111","zxcvbn","555555","11111111","131313","freedom","777777","pass","maggie","159753","aaaaaa","ginger","princess","joshua","cheese","amanda","summer","love","ashley","nicole","chelsea","biteme","matthew","access","yankees","987654321","dallas","austin","thunder","taylor","matrix","mobilemail","william","corvette","hello","martin","heather","secret","merlin","diamond","1234qwer","gfhjkm","hammer","silver","222222","88888888","anthony","justin","test","bailey","q1w2e3r4t5","patrick","internet","scooter","orange","11111","golfer","cookie","richard","samantha","bigdog","guitar","jackson","whatever","mickey","chicken","sparky","snoopy","maverick","phoenix","camaro","peanut","morgan","welcome","falcon","cowboy","ferrari","samsung","andrea","smokey","steelers","joseph","mercedes","dakota","arsenal","eagles","melissa","boomer","booboo","spider","nascar","monster","tigers","yellow","xxxxxx","123123123","gateway","marina","diablo","bulldog","qwer1234","compaq","purple","hardcore","banana","junior","hannah","123654","porsche","lakers","iceman","money","cowboys","987654","london","tennis","999999","ncc1701","coffee","scooby","0000","miller","boston","q1w2e3r4","fuckoff","brandon","yamaha","chester","mother","forever","johnny","edward","333333","oliver","redsox","player","nikita","knight","fender","barney","midnight","please","brandy","badboy","iwantu","slayer","rangers","charles","flower","bigdaddy","wizard","jasper","rachel","eagle1","shelby","anderson","sexsex","scorpion","german","winston","tommy","madison","victor","beautiful","mercedes1","creative","sterling","thunder1","apollo","fire","ward","dragon1","panties","sriram","woody","clinton","dennis","passw0rd","bobby","rosebud","hammer1","time","murphy","carolina","33333","family","hannah1","pass123","xxxxx","bubba","johnson","teresa","amateur","ghbdtn","qwerty123","fluffy","gerald","chris1","orlando","anthony1","corvette1","fishing","wolves","warrior","testing","stephen","sabrina","sunshine1","ssssss","swimming","dominic","lovers","abcdefg","patrick1","pookie","lucky1","scotland","phantom","student","250250","lexicon","champion","aaliyah","captain","maddog","jasmine","natasha","pa55word","destiny","pussycat","dallas1","viking","bluebird","catfish","1q2w3e4r","golden","252525","charles1","blazer","doctor","gateway1","butthead","william1","qwerty1","2002","147258","playboy","michael1","jennifer1","warrior1","jessica1","q1w2e3","nicholas","running","redskins","elephant","barbie","rachel1","1q2w3e4r5t","madison1","raiders","sammy","dolphins","packers","tiffany","jasmine1","brandon1","1qaz2wsx3edc","babygirl","panther","jackson1","arsenal1","ferrari1","welcome1","turtle","qwer","porsche1","tomcat","rebecca","trustno","trouble","falcon1","thomas1","prince","mercedes2","cool","soccer1","jackson2","pumpkin","buttercup","rainbow","tequila","mother1","surfer","popcorn","princess1","buddy1","georgia","sweety","house","4444","2001","peanut1","william2","whatever1","hooters","shelby1","looking","loser","cocacola","michael2","gemini","sexy","abcdef","gandalf","digital","jester","12341234","11112222","admin","letmein1","money1","mustang1","lakers1","cowboy1","asd123","passpass","iloveu","spring","galaxy","explorer","eagles1","champion1","honda","angel1","147258369","martin1","savannah","george1","alexis","crystal","lucky","maverick1","12121212","summer1","sparky1","morgan1","diamond1","soccer2","charlie1","spider1","samson","computer1","hitman","tiger1","sunshine2","midnight1","dallas2","muffin","snoopy1","angels","bandit","jackson3","college","florida","arsenal2","guitar1","scooter1","silver1","america","bigdog1","cookie1","tigers1","777","angel","dolphins1","steelers1","a1b2c3d4","qwert","nascar1","iceman1","amber","hello1","hammer2","chicago","1a2b3c4d","packers1","tennis1","coffee1","smokey1","a1b2c3","cowboys1","chicken1","andrea1","peanut2","batman1","357951","buster1","booboo1","melissa1","falcon2","camaro1","bulldog1","purple1","junior1","hannah2","london1","harley1","yellow1","monster1","player1","boston1","chester1","midnight2","fender1","ranger1","barney1","flower1","bigdaddy1","wizard1","jasper1","scorpion1","panties1","woody1","pass1234","letmein2","qwerty12","admin123","root","toor","password1","password123","administrator","changeme","default","guest","login","master123","abc1234","passw0rd1","welcome123","1q2w3e","qweasd","asdqwe","zaq12wsx","1234abcd","abcd1234","qweasdzxc","p@ssw0rd","p@ssword","pa$$word","p4ssw0rd","passwd","pass1","mypass","mypassword","iloveyou1","lovely","beauty","freedom1","whatever2","nothing","google","facebook","youtube","twitter","linkedin","instagram","snapchat","tiktok","amazon","apple","microsoft","windows","linux","ubuntu","macos","android","iphone","samsung1","nokia","intel","nvidia","amd","dell","lenovo","cisco","oracle","adobe","spotify","netflix","disney","marvel","dc","pokemon","minecraft","fortnite","roblox","valorant","overwatch","league","dota","csgo","pubg","apex","warzone","destiny1","halo","zelda","mario","luigi","peach","bowser","pikachu","charizard","mewtwo","snorlax","eevee","naruto","sasuke","goku","vegeta","luffy","zoro","onepiece","bleach","death","note","attack","titan","demon","slayer","jujutsu","kaisen","myheroacademia","dragonball","fullmetal","alchemist","cowboy","bebop","evangelion","gundam","sailor","moon","cardcaptor","sakura","inuyasha","trigun","champloo","samurai","ninja","ronin","shogun","katana","bushido","sakura1","cherry","blossom","bamboo","lotus","orchid","jasmine2","lily","rose","daisy","violet","tulip","sunflower","dandelion","lavender","magnolia","dahlia","poppy","iris","chrysanthemum","carnation","gardenia","hibiscus","plumeria","peony","azalea","camellia","daffodil","freesia","hydrangea","lilac","marigold","wisteria","zinnia","aster","begonia","cosmos","foxglove","gladiolus","heather1","hyacinth","jonquil","lantana","mimosa","narcissus","pansy","primrose","snapdragon","verbena","yarrow","anemone","bluebell","buttercup1","clover","fern","holly","ivy","jasmine3","juniper","laurel","maple","oakwood","olive","palm","pine","redwood","sage","sequoia","spruce","sycamore","teak","walnut","willow","cypress","birch","cedar","elm","aspen","acacia","alder","beech","cherry1","chestnut","ebony","eucalyptus","fig","hazel","hemlock","hickory","larch","lemon","lime","mahogany","mango","mulberry","nutmeg","pecan","persimmon","plum","pomegranate","quince","raspberry","rowan","rubber","sandalwood","sassafras","tamarind","yew","almond","apricot","avocado","blackberry","blueberry","boysenberry","cantaloupe","coconut","cranberry","elderberry","gooseberry","grape","grapefruit","guava","honeydew","jackfruit","kiwi","kumquat","lychee","mandarin","melon","nectarine","papaya","passion","pawpaw","peach1","pear","pineapple","plantain","raisin","starfruit","strawberry","tangerine","watermelon","baseball1","basketball","cricket","football1","golf","hockey1","lacrosse","rugby","volleyball","wrestling","swimming1","boxing","cycling","fencing","gymnastics","karate","rowing","sailing","skating","skiing","surfing","diving","archery","badminton","climbing","equestrian","handball","judo","marathon","polo","squash","taekwondo","triathlon","weightlifting","yoga","pilates","crossfit","bodybuilding","cardio","fitness","health","wellness","strength","endurance","flexibility","balance","coordination","agility","speed","power","stamina","recovery","nutrition","hydration","sleep","rest","meditation","mindfulness","breathwork","stretching","warmup","cooldown","interval","circuit","hiit","tabata","emom","amrap","metcon","wod","benchmark","pr","rep","set","tempo","volume","intensity","frequency","periodization","deload","peak","taper","competition","performance","technique","form","posture","alignment","mobility","stability","rehab","prehab","injury","prevention","treatment","therapy","massage","chiropractic","acupuncture","physical","occupational"]);
const CHAR_SETS={lowercase:"abcdefghijklmnopqrstuvwxyz",uppercase:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",numbers:"0123456789",symbols:"!@#$%^&*()_+-=[]{}|;:,.<>?"};
const charTypes={lowercase:true,uppercase:true,numbers:true,symbols:true};

function levenshtein(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return dp[m][n]}

function checkPassword(password,username){
  const feedback=[];let score=0;
  if(!password)return{score:0,label:"",feedback:[],isCommon:false,tooSimilar:false};
  const isCommon=COMMON_PASSWORDS.has(password.toLowerCase());
  const pw=password.toLowerCase(),un=username.toLowerCase();
  let tooSimilar=false;
  if(username){if(pw.includes(un)||un.includes(pw))tooSimilar=true;else{const d=levenshtein(pw,un);const mx=Math.max(pw.length,un.length);if(mx>0&&d/mx<0.4)tooSimilar=true}}
  if(isCommon){feedback.push("⚠ This is a commonly used password found in breach databases");return{score:0,label:"COMPROMISED",feedback,isCommon,tooSimilar}}
  if(tooSimilar){feedback.push("⚠ Password is too similar to your username");return{score:0,label:"REJECTED",feedback,isCommon,tooSimilar}}
  if(password.length>=16)score+=2;else if(password.length>=12)score+=1.5;else if(password.length>=8)score+=1;else feedback.push("Use at least 8 characters");
  const hasL=/[a-z]/.test(password),hasU=/[A-Z]/.test(password),hasD=/\d/.test(password),hasS=/[^a-zA-Z0-9]/.test(password);
  score+=[hasL,hasU,hasD,hasS].filter(Boolean).length*0.5;
  if(!hasU)feedback.push("Add uppercase letters");if(!hasL)feedback.push("Add lowercase letters");if(!hasD)feedback.push("Add numbers");if(!hasS)feedback.push("Add special characters (!@#$%...)");
  if(/(.){2,}/.test(password)){score-=0.5;feedback.push("Avoid repeated characters")}
  if(/^(012|123|234|345|456|567|678|789|abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz)/i.test(password)){score-=0.5;feedback.push("Avoid sequential patterns")}
  const ur=new Set(password.toLowerCase()).size/password.length;if(ur>0.7)score+=0.5;
  const fs=Math.max(0,Math.min(4,Math.round(score)));
  const labels=["WEAK","FAIR","GOOD","STRONG","EXCELLENT"];
  if(fs>=3&&feedback.length===0)feedback.push("✓ Strong password!");
  return{score:fs,label:labels[fs],feedback,isCommon,tooSimilar}
}

const colors=["#ef4444","#f59e0b","#22c55e","#22c55e","#22c55e"];
const shieldColors={none:"#6b7280",bad:"#ef4444",good:"#22c55e",fair:"#f59e0b"};
const shieldSVG=(c)=>`<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;

const $=id=>document.getElementById(id);
const pw=$("password"),un=$("username"),area=$("strengthArea"),meter=$("meter"),mLabel=$("meterLabel"),mScore=$("meterScore"),fb=$("feedback"),shield=$("shieldIcon");

shield.innerHTML=shieldSVG(shieldColors.none);

function update(){
  const r=checkPassword(pw.value,un.value);
  if(!pw.value){area.classList.add("hidden");shield.innerHTML=shieldSVG(shieldColors.none);return}
  area.classList.remove("hidden");
  const sc=r.isCommon||r.tooSimilar?shieldColors.bad:r.score>=3?shieldColors.good:r.score>=2?shieldColors.fair:shieldColors.bad;
  shield.innerHTML=shieldSVG(sc);
  meter.innerHTML="";for(let i=0;i<5;i++){const s=document.createElement("div");s.className="meter-seg";if(i<=r.score&&r.score>0)s.style.background=colors[r.score];meter.appendChild(s)}
  mLabel.textContent=r.label;mLabel.style.color=colors[r.score]||"#6b7280";
  mScore.textContent=r.score+"/4";mScore.style.color=colors[r.score]||"#6b7280";
  fb.innerHTML="";r.feedback.forEach(f=>{const p=document.createElement("p");p.textContent=f.startsWith("✓")||f.startsWith("⚠")?f:"› "+f;p.className=f.startsWith("✓")?"fb-good":f.startsWith("⚠")?"fb-warn":"fb-info";fb.appendChild(p)})
}

pw.addEventListener("input",update);un.addEventListener("input",update);

let showPw=false;
$("toggleVis").addEventListener("click",()=>{showPw=!showPw;pw.type=showPw?"text":"password";$("toggleVis").innerHTML=showPw?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'});

// Generator
const grid=$("charGrid"),lenSlider=$("lenSlider"),lenVal=$("lenVal"),genOut=$("genOut"),copyBtn=$("copyBtn"),genBtn=$("genBtn");
let generated="";

function renderGrid(){grid.innerHTML="";Object.keys(CHAR_SETS).forEach(t=>{const b=document.createElement("button");b.type="button";b.className="char-btn "+(charTypes[t]?"active":"inactive");b.textContent=t.charAt(0).toUpperCase()+t.slice(1);b.onclick=()=>{const active=Object.values({...charTypes,[t]:!charTypes[t]}).filter(Boolean).length;if(active===0)return;charTypes[t]=!charTypes[t];renderGrid()};grid.appendChild(b)})}
renderGrid();

lenSlider.addEventListener("input",()=>{lenVal.textContent=lenSlider.value});

genBtn.addEventListener("click",()=>{
  const pool=Object.keys(charTypes).filter(k=>charTypes[k]).map(k=>CHAR_SETS[k]).join("");
  if(!pool)return;
  const len=parseInt(lenSlider.value);const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  generated=Array.from(arr,v=>pool[v%pool.length]).join("");
  genOut.textContent=generated;genOut.className="";copyBtn.disabled=false;
});

copyBtn.addEventListener("click",async()=>{
  if(!generated)return;
  await navigator.clipboard.writeText(generated);
  copyBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  setTimeout(()=>{copyBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'},2000);
});
</script>
</body>
</html>
